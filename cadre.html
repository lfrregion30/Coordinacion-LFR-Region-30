<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio CADRE - Fundación Rotaria Región 30</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    
    <style>
        .buscador-contenedor { margin: 40px 0; text-align: center; }
        .caja-busqueda { max-width: 700px; margin: 20px auto; position: relative; }

        #buscadorCadre {
            width: 100%; padding: 15px 25px; border-radius: 30px;
            border: 2px solid #17458f; font-size: 1.1rem; outline: none;
            transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        #buscadorCadre:focus { border-color: #f7a81b; box-shadow: 0 4px 12px rgba(23, 69, 143, 0.2); }

        /* Contenedor de etiquetas */
        .areas-wrapper { display: flex; flex-wrap: wrap; gap: 6px; }

        .especialidad-tag {
            background: #eef4fb; padding: 4px 10px; border-radius: 4px;
            font-size: 0.82em; color: #17458f; font-weight: bold;
            border: 1px solid #d0e1f5; white-space: nowrap;
        }

        .btn-email { color: #17458f; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .btn-email:hover { text-decoration: underline; }
        .flag-icon { margin-right: 5px; border-radius: 2px; }
		
		/* Forzamos a que la columna de nombres sea más ancha */
#tablaCadre th:first-child, 
#tablaCadre td:first-child {
    min-width: 250px; /* Ajusta este número si los nombres son muy largos */
    white-space: nowrap; /* Evita que el nombre salte de línea */
}

/* Ajuste para que las celdas de contacto no se peguen */
#tablaCadre td {
    padding: 15px 10px;
    vertical-align: middle;
}
		
/* Forzamos a que la columna de nombres sea más ancha */
#tablaCadre th:first-child, 
#tablaCadre td:first-child {
    min-width: 250px; /* Ajusta este número si los nombres son muy largos */
    white-space: nowrap; /* Evita que el nombre salte de línea */
}

/* Ajuste para que las celdas de contacto no se peguen */
#tablaCadre td {
    padding: 15px 10px;
    vertical-align: middle;
}		
		
    </style>
</head>
<body>

    <header>
        <div class="contenedor header-flex">
            <a href="index.html">
                <img src="img/logo-coordinacion.png" alt="Logo Rotary Región 30" class="logo">
            </a>
        </div>
    </header>

    <nav>
        <div class="contenedor">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
                <li><a href="subvenciones.html">Subvenciones</a></li>
                <li><a href="recursos.html">Recursos</a></li>
                <li><a href="metas.html">Metas</a></li>
                <li><a href="cadre.html" class="activo">CADRE</a></li>
            </ul>
        </div>
    </nav>

    <section class="hero" style="min-height: 200px; padding: 40px 0;">
        <div class="hero-content">
            <h1>Directorio CADRE</h1>
            <p>Asesores Técnicos de la Fundación Rotaria - Región 30</p>
        </div>
    </section>

    <main class="contenedor">
        <div class="buscador-contenedor">
            <h2>Encuentra un Especialista</h2>
            <div class="caja-busqueda">
                <input type="text" id="buscadorCadre" onkeyup="filtrarCadre()" placeholder="🔍 Buscar por nombre, distrito o área (ej: Agua, Salud)...">
            </div>
        </div>

        <div class="tabla-responsiva">
            <table id="tablaCadre">
                <thead>
                    <tr>
                        <th>Especialista</th>
                        <th>País</th>
                        <th>Distrito</th>
                        <th>Áreas de Especialización</th>
                        <th>Contacto</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    <tr><td colspan="5" style="text-align:center;">Cargando directorio...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ12qKqrOoTCONB-C7eDbKkP2hTpOZeF9Iyvqfic_JR65FpjGPgAPfYJF2GGmakZcFfZyZaXPYI3D2o/pub?output=csv';
        let especialistasGlobal = [];

        function obtenerBandera(pais) {
            const p = pais.toLowerCase().trim();
            if (p.includes("chile")) return "cl";
            if (p.includes("peru") || p.includes("perú")) return "pe";
            if (p.includes("bolivia")) return "bo";
            if (p.includes("ecuador")) return "ec";
            if (p.includes("argentina")) return "ar";
            if (p.includes("paraguay")) return "py";
            if (p.includes("uruguay")) return "uy";
            return "";
        }

        async function cargarDatos() {
            try {
                const response = await fetch(urlCSV);
                const data = await response.text();
                
                // Función para procesar CSV con comas y comillas correctamente
                const filas = procesarCSV(data);

                especialistasGlobal = filas.slice(1).map(col => {
                    if (col.length >= 6) {
                        return {
                            nombre: col[0],
                            apellidos: col[1],
                            pais: col[2],
                            correo: col[3],
                            distrito: col[4],
                            area: col[5] // Aquí viene el texto con los ";"
                        };
                    }
                    return null;
                }).filter(e => e !== null);

                renderizarTabla(especialistasGlobal);
            } catch (error) {
                document.getElementById('cuerpoTabla').innerHTML = '<tr><td colspan="5">Error al cargar datos.</td></tr>';
            }
        }

        // Algoritmo para leer CSV evitando errores por comas internas
        function procesarCSV(texto) {
            const filas = [];
            let currFila = [];
            let currCelda = "";
            let enComillas = false;

            for (let i = 0; i < texto.length; i++) {
                let c = texto[i];
                if (c === '"') enComillas = !enComillas;
                else if (c === ',' && !enComillas) { currFila.push(currCelda.trim()); currCelda = ""; }
                else if (c === '\n' && !enComillas) { 
                    currFila.push(currCelda.trim()); 
                    filas.push(currFila); 
                    currFila = []; currCelda = ""; 
                }
                else currCelda += c;
            }
            if (currCelda) { currFila.push(currCelda.trim()); filas.push(currFila); }
            return filas;
        }

        function renderizarTabla(datos) {
            const tbody = document.getElementById('cuerpoTabla');
            tbody.innerHTML = datos.map(e => {
                const iso = obtenerBandera(e.pais);
                const banderaHtml = iso ? `<span class="flag-icon flag-icon-${iso}"></span>` : '🌐';
                
                // SEPARACIÓN POR PUNTO Y COMA
                const areas = e.area.split(';').filter(a => a.trim() !== "");
                const tagsHtml = areas.map(a => `<span class="especialidad-tag">${a.trim()}</span>`).join('');

                return `
                    <tr>
                        <td><strong>${e.nombre} ${e.apellidos}</strong></td>
                        <td>${banderaHtml} ${e.pais}</td>
                        <td>Distrito ${e.distrito}</td>
                        <td><div class="areas-wrapper">${tagsHtml}</div></td>
                        <td><a href="mailto:${e.correo}" class="btn-email">✉️ Contactar</a></td>
                    </tr>
                `;
            }).join('');
        }

        function filtrarCadre() {
            const busqueda = document.getElementById('buscadorCadre').value.toLowerCase();
            const filtrados = especialistasGlobal.filter(e => 
                e.nombre.toLowerCase().includes(busqueda) ||
                e.apellidos.toLowerCase().includes(busqueda) ||
                e.area.toLowerCase().includes(busqueda) ||
                e.distrito.toLowerCase().includes(busqueda)
            );
            renderizarTabla(filtrados);
        }

        cargarDatos();
    </script>
</body>
</html>
